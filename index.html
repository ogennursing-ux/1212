<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Never cache index.html so a new deploy is picked up immediately -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="תיק עובד זר - ניהול מסמכי דרכון, אשרה והיתר והפקת חוזה שנתי" />
    <title>תיק עובד זר | עוגן סיעוד</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Always load the newest deploy: if the running app's JS differs from what's
         served now, reload once. Keeps a single plain link always up to date. -->
    <script>
      (function () {
        function check() {
          try {
            var el = document.querySelector('script[type="module"][src*="/assets/"]');
            var loaded = el && (el.getAttribute('src').match(/[\w.-]+\.js/) || [])[0];
            if (!loaded) return;
            fetch(location.pathname + '?_=' + Date.now(), { cache: 'no-store' })
              .then(function (r) { return r.text(); })
              .then(function (html) {
                if (html.indexOf(loaded) === -1) { // our JS is no longer served → new deploy
                  if (sessionStorage.getItem('ogenReloadTo') !== loaded) {
                    sessionStorage.setItem('ogenReloadTo', loaded);
                    location.reload();
                  }
                } else {
                  sessionStorage.removeItem('ogenReloadTo');
                }
              }).catch(function () {});
          } catch (e) { /* ignore */ }
        }
        setTimeout(check, 1500);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') check();
        });
      })();
    </script>
  </body>
</html>
